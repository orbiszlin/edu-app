<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>lobby</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">lobby</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-button expand="full" (click)="onStartGame()">Start Game</ion-button>
  <ion-button expand="full" (click)="onStopGame()">Leave lobby</ion-button>
</ion-content>
